name: Daily AutoPress Edition

on:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-autopress-edition
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate daily store snapshot
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npm run generate:store

      - name: Commit updated store.json (if changed)
        run: |
          git status --porcelain
          if [ -z "$(git status --porcelain public/data/store.json)" ]; then
            echo "No changes to public/data/store.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/store.json
          git commit -m "chore: publish daily edition snapshot"
          git push

